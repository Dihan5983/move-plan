<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Move HQ">
<meta name="theme-color" content="#13131f">
<meta name="description" content="Move Planning HQ — tasks, budget, storage layout, logistics and box labels">
<title>Move Planning HQ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #13131f;
    --surface: #1e1e30;
    --surface2: #252538;
    --accent: #E86C3A;
    --green: #4CAF82;
    --amber: #F0A500;
    --red: #E05252;
    --blue: #5B8BD0;
    --text: #f0ece4;
    --muted: #888;
    --border: #2e2e46;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

  /* HEADER */
  .header { background: linear-gradient(135deg, var(--surface) 0%, #161625 100%); border-bottom: 3px solid var(--accent); padding: 28px 24px 20px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 820px; margin: 0 auto; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
  .header-eyebrow { font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 26px; line-height: 1.2; }
  .header-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .countdown { text-align: right; }
  .countdown-num { font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 700; line-height: 1; }
  .countdown-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .progress-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin: 18px 0 6px; }
  .progress-bar { background: #111; border-radius: 8px; height: 8px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, var(--accent), var(--green)); height: 100%; border-radius: 8px; transition: width 0.4s ease; }

  /* TABS */
  .tabs { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 153px; z-index: 99; }
  .tabs-inner { max-width: 820px; margin: 0 auto; display: flex; overflow-x: auto; }
  .tab-btn { background: none; border: none; color: var(--muted); padding: 13px 20px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; border-bottom: 2px solid transparent; white-space: nowrap; letter-spacing: 0.3px; transition: color 0.2s; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover { color: var(--text); }

  /* CONTENT */
  .content { max-width: 820px; margin: 0 auto; padding: 24px 16px 120px; }

  /* CARDS */
  .card { background: var(--surface); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card-accent { border-left: 4px solid; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border-radius: 10px; padding: 14px 16px; }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .stat-sub { font-size: 11px; color: var(--muted); }

  /* SECTION HEADERS */
  .section-title { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 12px; margin-top: 24px; }

  /* TASKS */
  .task-item { background: var(--surface); border-radius: 8px; padding: 13px 15px; cursor: pointer; display: flex; gap: 12px; align-items: flex-start; border-left: 3px solid; transition: all 0.2s; margin-bottom: 6px; user-select: none; }
  .task-item:hover { background: var(--surface2); }
  .task-item.done { opacity: 0.45; }
  .task-check { min-width: 22px; height: 22px; border-radius: 50%; background: #2a2a40; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-top: 1px; flex-shrink: 0; transition: background 0.2s; }
  .task-item.done .task-check { background: var(--green); }
  .task-text { font-size: 13.5px; line-height: 1.5; flex: 1; }
  .task-item.done .task-text { text-decoration: line-through; color: #555; }
  .task-critical { font-size: 10px; color: var(--red); margin-top: 3px; letter-spacing: 0.5px; }

  /* WEEK SELECTOR */
  .week-pills { display: flex; gap: 6px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px; flex-wrap: wrap; }
  .week-pill { border: none; border-radius: 20px; padding: 7px 14px; cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif; transition: all 0.2s; white-space: nowrap; }

  /* BUDGET */
  .budget-item { background: var(--surface); border-radius: 8px; padding: 12px 15px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .budget-label { font-size: 13px; color: #ccc; flex: 1; }
  .budget-range { font-size: 13px; white-space: nowrap; }

  /* STORAGE ZONES */
  .zone-card { background: var(--surface); border-radius: 10px; padding: 16px; margin-bottom: 12px; border-left: 4px solid; }
  .zone-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .zone-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .zone-tag { background: #111; border-radius: 4px; padding: 4px 10px; font-size: 11px; color: #ccc; }
  .zone-note { font-size: 12px; color: var(--muted); font-style: italic; }

  /* STORAGE DIAGRAM */
  .diagram { background: #0d0d18; border-radius: 10px; padding: 18px; margin-bottom: 20px; border: 1px solid var(--border); }
  .diagram-row { border-radius: 5px; padding: 9px 14px; font-size: 12px; text-align: center; margin-bottom: 3px; letter-spacing: 0.3px; }

  /* PHASE TIMELINE */
  .phase-row { background: var(--surface); border-radius: 8px; padding: 11px 15px; cursor: pointer; display: flex; align-items: center; gap: 14px; border-left: 3px solid; margin-bottom: 6px; transition: background 0.2s; }
  .phase-row:hover { background: var(--surface2); }
  .phase-dates { min-width: 70px; font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .phase-theme { font-size: 13px; flex: 1; }
  .phase-bar { background: #111; border-radius: 4px; height: 4px; margin-top: 5px; }
  .phase-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .phase-count { font-size: 11px; color: var(--muted); min-width: 55px; text-align: right; }

  /* URGENT LIST */
  .urgent-item { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .urgent-item:last-child { border-bottom: none; }
  .urgent-num { color: var(--red); font-weight: 700; min-width: 18px; }
  .urgent-text { font-size: 13px; color: #ddd; line-height: 1.5; }

  /* MOTIVATION CARD */
  .motivation { background: var(--surface); border-radius: 10px; padding: 16px 18px; border-left: 4px solid var(--green); margin-top: 20px; }

  /* CLAUDE PANEL */
  .fab { position: fixed; bottom: calc(28px + env(safe-area-inset-bottom)); right: 24px; background: var(--accent); color: white; border: none; border-radius: 50px; padding: 14px 22px; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; box-shadow: 0 4px 20px rgba(232, 108, 58, 0.4); z-index: 200; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
  .fab:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(232, 108, 58, 0.5); }
  .fab svg { width: 18px; height: 18px; }

  .claude-panel { position: fixed; bottom: 0; right: 0; padding-bottom: env(safe-area-inset-bottom); width: 420px; max-width: 100vw; height: 520px; background: var(--surface); border-radius: 16px 16px 0 0; border-top: 1px solid var(--border); border-left: 1px solid var(--border); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 300; box-shadow: -4px -4px 40px rgba(0,0,0,0.5); transform: translateY(100%); transition: transform 0.3s ease; overflow: hidden; }
  .claude-panel.open { transform: translateY(0); }
  .claude-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; min-height: 52px; }
  .claude-title { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .claude-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .claude-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 2px 6px; }
  .claude-messages { flex: 1; min-height: 0; max-height: calc(520px - 52px - 70px); overflow-y: scroll; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
  .claude-messages::-webkit-scrollbar { width: 5px; }
  .claude-messages::-webkit-scrollbar-track { background: var(--surface); }
  .claude-messages::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
  .claude-messages::-webkit-scrollbar-thumb:hover { background: #ff8c5a; }
  .msg { max-width: 90%; padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .msg.user { background: var(--accent); color: white; align-self: flex-end; border-radius: 10px 10px 2px 10px; }
  .msg.assistant { background: var(--surface2); color: var(--text); align-self: flex-start; border-radius: 10px 10px 10px 2px; }
  .msg.system { background: transparent; color: var(--muted); font-size: 11px; align-self: center; text-align: center; font-style: italic; }
  .claude-input-row { padding: 12px 14px; border-top: 2px solid var(--accent); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; background: var(--surface); min-height: 70px; max-height: 70px; }
  .claude-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; resize: none; max-height: 100px; }
  .claude-input:focus { border-color: var(--accent); }
  .claude-send { background: var(--accent); border: none; color: white; border-radius: 8px; padding: 10px 16px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; white-space: nowrap; flex-shrink: 0; height: 42px; }
  .claude-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* API KEY SETUP */
  .api-setup { padding: 20px; text-align: center; }
  .api-setup h3 { font-size: 14px; margin-bottom: 8px; color: var(--accent); }
  .api-setup p { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  .api-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; outline: none; margin-bottom: 10px; }
  .api-input:focus { border-color: var(--accent); }
  .api-save { background: var(--accent); border: none; color: white; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; width: 100%; }
  .api-link { font-size: 11px; color: var(--blue); margin-top: 8px; display: block; }

  /* TIPS */
  .tip-item { font-size: 13px; color: #ccc; padding: 5px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .tip-item:last-child { border-bottom: none; }

  /* NAV buttons */
  .nav-btns { display: flex; justify-content: space-between; margin-top: 20px; }
  .nav-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 9px 18px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: background 0.2s; }
  .nav-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .nav-btn:hover { background: var(--surface2); }
  .nav-btn.primary:hover { opacity: 0.9; }


  /* BOX LABELS */
  .room-pill { border: none; border-radius: 20px; padding: 7px 14px; cursor: pointer; font-size: 12px; font-family: 'DM Sans',sans-serif; font-weight: 600; transition: all 0.2s; letter-spacing: 0.3px; }
  .box-card { background: var(--surface); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; border-left: 5px solid; }
  .box-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .box-num { font-family: 'Playfair Display',serif; font-size: 28px; font-weight: 700; line-height: 1; }
  .box-room { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; opacity: 0.8; }
  .box-items-list { list-style: none; margin-top: 8px; }
  .box-item-entry { display: flex; align-items: center; gap: 8px; padding: 3px 0; border-bottom: 1px solid var(--border); }
  .box-item-entry:last-child { border-bottom: none; }
  .box-item-input { background: transparent; border: none; color: var(--text); font-family: 'DM Sans',sans-serif; font-size: 13px; flex: 1; outline: none; padding: 2px 0; }
  .box-item-input::placeholder { color: var(--muted); }
  .box-item-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; opacity: 0.5; padding: 0; }
  .box-item-del:hover { opacity: 1; color: var(--red); }

  /* PRINT STYLES */
  @media print {
    .header, .tabs, .fab, .claude-panel, .no-print { display: none !important; }
    .content { padding: 0 !important; max-width: 100% !important; }
    body { background: white !important; color: black !important; }
    .print-labels-grid { display: grid !important; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px; }
    .print-label { border: 2px solid #333; border-radius: 8px; padding: 14px; page-break-inside: avoid; }
    .print-label-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #333; }
    .print-label-dot { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
    .print-label-num { font-family: serif; font-size: 32px; font-weight: 700; line-height: 1; }
    .print-label-room { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; margin-top: 2px; }
    .print-label-items { list-style: disc; padding-left: 16px; font-size: 11px; line-height: 1.7; }
    .print-label-dest { font-size: 9px; border-top: 1px solid #ccc; margin-top: 8px; padding-top: 6px; text-transform: uppercase; letter-spacing: 1px; color: #666; }
  }

  /* SHOPPING LIST */
  .shop-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  .shop-th { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .shop-th.right { text-align: right; }
  .shop-row { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .shop-row:hover { background: var(--surface2); }
  .shop-row.bought td { opacity: 0.4; }
  .shop-row.bought .shop-desc { text-decoration: line-through; }
  .shop-td { padding: 10px 10px; vertical-align: middle; }
  .shop-td.right { text-align: right; }
  .shop-inline { background: transparent; border: none; border-bottom: 1px dashed var(--border); color: var(--text); font-family: 'DM Sans',sans-serif; font-size: 13px; width: 100%; outline: none; padding: 2px 0; }
  .shop-inline:focus { border-bottom-color: var(--accent); }
  .shop-inline.num { width: 60px; text-align: right; }
  .shop-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .shop-check.done { background: var(--green); border-color: var(--green); }
  .shop-desc { font-size: 13px; }
  .shop-store { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .shop-add-row { width: 100%; background: none; border: 1px dashed var(--border); border-radius: 8px; padding: 10px; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'DM Sans',sans-serif; margin-top: 4px; transition: border-color 0.2s; }
  .shop-add-row:hover { border-color: var(--accent); color: var(--accent); }
  .shop-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; opacity: 0.5; }
  .shop-del:hover { opacity: 1; color: var(--red); }
  /* LOGISTICS */
  .log-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .log-input-card { background: var(--surface); border-radius: 10px; padding: 14px; }
  .log-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .log-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-family: 'DM Sans',sans-serif; font-size: 14px; font-weight: 600; outline: none; }
  .log-input:focus { border-color: var(--accent); }
  .log-unit { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .result-card { border-radius: 10px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 16px; }
  .result-big { font-family: 'Playfair Display',serif; font-size: 32px; font-weight: 700; line-height: 1; }
  .result-label { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .trip-row { background: var(--surface); border-radius: 8px; padding: 11px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .trip-icon { font-size: 20px; flex-shrink: 0; }
  /* FLOOR PLAN */
  .fp-upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 28px; text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 16px; }
  .fp-upload-area:hover { border-color: var(--accent); }
  .fp-upload-area input { display: none; }
  .fp-item-card { background: var(--surface); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; border-left: 4px solid; }
  .fp-item-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
  .fp-item-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .fp-item-meta { font-size: 11px; color: var(--muted); }
  .fp-item-badge { font-size: 10px; border-radius: 4px; padding: 2px 7px; font-weight: 600; letter-spacing: 0.5px; }
  .fp-unit { background: #0d0d18; border-radius: 10px; padding: 16px; margin: 16px 0; border: 1px solid var(--border); overflow-x: auto; }
  .fp-loading-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .fp-loading-item { background: var(--surface); border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .fp-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .fp-analyzing { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 13px; color: var(--muted); background: var(--surface); border-radius: 8px; margin-bottom: 8px; }
  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  /* Thinking indicator */
  .thinking { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .thinking span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
</style>
</head>
<body>

<!-- APP ROOT -->
<div id="app">
  <!-- Header rendered by JS -->
</div>

<!-- CLAUDE FLOATING BUTTON -->
<button class="fab" onclick="togglePanel()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
  Ask Claude to update
</button>

<!-- CLAUDE PANEL -->
<div class="claude-panel" id="claudePanel">
  <div class="claude-header">
    <div class="claude-title">
      <div class="claude-dot"></div>
      Claude Move Assistant
    </div>
    <button class="claude-close" onclick="togglePanel()">×</button>
  </div>
  <div id="claudeBody">
    <!-- API setup or chat -->
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════

const MOVE_DATE = '2026-05-30';

const defaultWeeks = [
  {
    id: 'w1', label: 'Week 1', dates: 'Apr 10–17', theme: '🚨 Immediate Actions', color: '#E05252',
    tasks: [
      { id: 't1', text: 'Give written notice to landlord (1 calendar month required)', critical: true },
      { id: 't2', text: 'Research & book 3×6m storage unit — get at least 2 quotes', critical: true },
      { id: 't3', text: 'Walk through home & create full inventory list', critical: false },
      { id: 't4', text: 'Decide: what goes to in-laws vs storage vs sell/donate', critical: true },

function daysLeft() {
  const now = new Date();
  const md = new Date(MOVE_DATE);
  return Math.max(0, Math.round((md - now) / 86400000));
}

function allTasks() {
  return state.weeks.flatMap(w => w.tasks);
}

function completedCount() {
  return allTasks().filter(t => state.checked[t.id]).length;
}

function progress() {
  const total = allTasks().length;
  return total ? Math.round((completedCount() / total) * 100) : 0;
}

function uid() {
  return 't' + Date.now() + Math.random().toString(36).slice(2,6);
}

function budgetUID() {
  return 'b' + Date.now() + Math.random().toString(36).slice(2,6);
}

  { id: 'bathroom',  label: 'Bathroom',        color: '#4ECDC4', dot: '#4ECDC4' },
  { id: 'storage',   label: 'Storage Unit',    color: '#F0A500', dot: '#F0A500' },
  // In-Laws excluded from box labels — items unpacked immediately on arrival
  { id: 'office',    label: 'Office / Study',  color: '#FF6B6B', dot: '#FF6B6B' },

function getRoomById(id) { return ROOMS.find(r => r.id === id) || ROOMS[0]; }

function boxUID() { return 'bx' + Date.now() + Math.random().toString(36).slice(2,5); }

function addBox(roomId) {
  if (!state.boxes) state.boxes = [];
  if (!state.labelSettings) state.labelSettings = { nextBoxNum: 1 };
  const num = state.labelSettings.nextBoxNum++;
  state.boxes.push({ id: boxUID(), num, roomId, dest: 'Storage', items: [''], lenCm: '', widCm: '', htCm: '', weight: 'medium', fragility: 'non-fragile' });
  saveState();
  render();
  // Focus the first item input of the new box
  setTimeout(() => {
    const inputs = document.querySelectorAll(`[data-boxid="${state.boxes[state.boxes.length-1].id}"]`);
    if (inputs[0]) inputs[0].focus();
  }, 50);
}

function deleteBox(id) {
  if (!confirm('Delete this box?')) return;
  state.boxes = (state.boxes||[]).filter(b => b.id !== id);
  saveState(); render();
}

function updateBoxItem(boxId, idx, val) {
  const box = (state.boxes||[]).find(b => b.id === boxId);
  if (!box) return;
  box.items[idx] = val;
  saveState();
}

function addBoxItem(boxId) {
  const box = (state.boxes||[]).find(b => b.id === boxId);
  if (!box) return;
  box.items.push('');
  saveState(); render();
  setTimeout(() => {
    const inputs = document.querySelectorAll(`[data-boxid="${boxId}"]`);
    if (inputs[inputs.length-1]) inputs[inputs.length-1].focus();
  }, 50);
}

function deleteBoxItem(boxId, idx) {
  const box = (state.boxes||[]).find(b => b.id === boxId);
  if (!box || box.items.length <= 1) return;
  box.items.splice(idx, 1);
  saveState(); render();
}

function updateBoxDest(boxId, val) {
  const box = (state.boxes||[]).find(b => b.id === boxId);
  if (box) { box.dest = val; saveState(); }
}

function updateBoxField(boxId, field, val) {
  const box = (state.boxes||[]).find(b => b.id === boxId);
  if (box) { box[field] = val; saveState(); }
}

function updateBoxRoom(boxId, roomId) {
  const box = (state.boxes||[]).find(b => b.id === boxId);
  if (box) { box.roomId = roomId; saveState(); render(); }
}

function selectRoom(id) {
  state._activeRoom = id;
  // Update pills without full re-render
  document.getElementById('activeRoomVal').value = id;
  ROOMS.forEach(r => {
    const pill = document.getElementById('rpill_'+r.id);
    if (!pill) return;
    if (r.id === id) {
      pill.style.background = r.color; pill.style.color = '#fff';
    } else {
      pill.style.background = 'var(--surface)'; pill.style.color = '#aaa';
    }
  });
}

function shUID() { return 'sh' + Date.now() + Math.random().toString(36).slice(2,5); }

function shopTotal(item) { return item.unitPrice * item.qty; }

function updateShop(id, field, val) {
  const item = (state.shopping||[]).find(i => i.id === id);
  if (!item) return;
  if (field === 'unitPrice' || field === 'qty') item[field] = parseFloat(val) || 0;
  else item[field] = val;
  saveState();
  // Re-render just the totals row without full render for snappy feel
  const totEl = document.getElementById('shopTotals');
  if (totEl) totEl.innerHTML = renderShopTotals();
}

function toggleBought(id) {
  const item = (state.shopping||[]).find(i => i.id === id);
  if (!item) return;
  item.bought = !item.bought;
  saveState();
  render();
}

function deleteShopItem(id) {
  state.shopping = (state.shopping||[]).filter(i => i.id !== id);
  saveState();
  render();
}

function addShopItem() {
  if (!state.shopping) state.shopping = [];
  state.shopping.push({ id: shUID(), desc: 'New item', store: '', unitPrice: 0, qty: 1, bought: false });
  saveState();
  render();
}

function renderShopTotals() {
  const items = state.shopping || [];
  const grandTotal = items.reduce((s,i) => s + shopTotal(i), 0);
  const boughtTotal = items.filter(i => i.bought).reduce((s,i) => s + shopTotal(i), 0);
  const remaining = grandTotal - boughtTotal;
  const pct = grandTotal > 0 ? Math.round((boughtTotal/grandTotal)*100) : 0;
  return `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:16px 0">
      <div class="stat-card" style="border-top:3px solid var(--accent)">
        <div class="stat-label">Total list</div>
        <div class="stat-value" style="color:var(--accent);font-size:20px">R${grandTotal.toLocaleString()}</div>
        <div class="stat-sub">${items.length} items</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--green)">
        <div class="stat-label">Purchased</div>
        <div class="stat-value" style="color:var(--green);font-size:20px">R${boughtTotal.toLocaleString()}</div>
        <div class="stat-sub">${items.filter(i=>i.bought).length} items ticked</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--amber)">
        <div class="stat-label">Still to buy</div>
        <div class="stat-value" style="color:var(--amber);font-size:20px">R${remaining.toLocaleString()}</div>
        <div class="stat-sub">${pct}% complete</div>
      </div>
    </div>
    <div style="background:#111;border-radius:8px;height:8px;overflow:hidden;margin-bottom:20px">
      <div style="background:linear-gradient(90deg,var(--green),var(--accent));width:${pct}%;height:100%;border-radius:8px;transition:width 0.4s"></div>
    </div>`;
}

  return `

  <div style="font-size:12px;color:var(--muted);margin-bottom:4px;line-height:1.6">

            ${item.bought ? '<svg width="11" height="11" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}

          </div>

function updateLogistic(key, val) {
  state.logistics[key] = parseFloat(val) || 0;
  saveState();
  const el = document.getElementById('logResults');
  if (el) el.innerHTML = renderLogResults();
}

function calcLogistics() {
  const L = state.logistics;
  const trailerVol = L.trailerLengthM * L.trailerWidthM * L.trailerHeightM;
  const unitVol = 3 * 6 * 1.8 * 0.65;
  const trailerUsable = trailerVol * 0.70;
  const mazdaLoads = Math.ceil(unitVol / trailerUsable);
  const distReturn = L.distanceKm * 2;
  const mazdaTotalKm = mazdaLoads * distReturn;
  const poloTotalKm = L.extraPoloTrips * distReturn;
  const mazdaLitres = (mazdaTotalKm / 100) * L.mazda5Lper100;
  const poloLitres = (poloTotalKm / 100) * L.poloPer100;
  const totalLitres = mazdaLitres + poloLitres;
  const totalFuelCost = totalLitres * L.petrolPrice;
  const mazdaHrs = mazdaLoads * 1.25;
  const poloHrs = L.extraPoloTrips * 0.75;
  return {
    mazdaLoads, trailerVol: trailerVol.toFixed(1), trailerUsable: trailerUsable.toFixed(1),
    mazdaTotalKm, poloTotalKm, mazdaLitres: mazdaLitres.toFixed(1),
    poloLitres: poloLitres.toFixed(1), totalLitres: totalLitres.toFixed(1),
    totalFuelCost: totalFuelCost.toFixed(0), totalHrs: (mazdaHrs + poloHrs).toFixed(1),
    poloTrips: L.extraPoloTrips
  };
}

function renderLogResults() {
  const L = state.logistics;
  const r = calcLogistics();
  const trips = [];
  for (let i = 1; i <= r.mazdaLoads; i++) {
    const km = L.distanceKm * 2;
    const litres = ((km / 100) * L.mazda5Lper100).toFixed(1);
    const cost = ((km / 100) * L.mazda5Lper100 * L.petrolPrice).toFixed(0);
    trips.push({ num: i, vehicle: 'Mazda 5 + Trailer', km, litres, cost, icon: '🚗', color: 'var(--accent)', label: 'Full trailer load' });
  }
  for (let i = 1; i <= r.poloTrips; i++) {
    const km = L.distanceKm * 2;
    const litres = ((km / 100) * L.poloPer100).toFixed(1);
    const cost = ((km / 100) * L.poloPer100 * L.petrolPrice).toFixed(0);
    trips.push({ num: r.mazdaLoads + i, vehicle: 'VW Polo', km, litres, cost, icon: '🚙', color: 'var(--blue)', label: 'Smaller items & boxes' });
  }
  return `
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px">
    <div class="result-card" style="background:var(--surface);border-top:3px solid var(--accent)">
      <div><div class="result-big" style="color:var(--accent)">${r.mazdaLoads}</div><div class="result-label">Trailer loads (Mazda)</div></div>
    </div>
    <div class="result-card" style="background:var(--surface);border-top:3px solid var(--blue)">
      <div><div class="result-big" style="color:var(--blue)">${r.poloTrips}</div><div class="result-label">Polo trips</div></div>
    </div>
    <div class="result-card" style="background:var(--surface);border-top:3px solid var(--green)">
      <div><div class="result-big" style="color:var(--green)">R${r.totalFuelCost}</div><div class="result-label">Total fuel cost</div></div>
    </div>
    <div class="result-card" style="background:var(--surface);border-top:3px solid var(--amber)">
      <div><div class="result-big" style="color:var(--amber)">${r.totalHrs}h</div><div class="result-label">Est. move time</div></div>
    </div>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Trailer: ${r.trailerVol}m³ total · ${r.trailerUsable}m³ usable · Storage unit ~${(3*6*1.8*0.65).toFixed(0)}m³ usable · Petrol @ R${L.petrolPrice}/L</div>
  <div class="section-title" style="color:var(--accent);margin-top:18px">🗓 Trip-by-Trip Breakdown</div>
  ${trips.map(t => `
    <div class="trip-row" style="border-left:3px solid ${t.color}">
      <div class="trip-icon">${t.icon}</div>
      <div style="flex:1">

        <div style="font-size:11px;color:var(--muted)">${t.label} · ${t.km}km round trip · ${t.litres}L</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:14px;font-weight:600;color:${t.color}">R${t.cost}</div>
        <div style="font-size:10px;color:var(--muted)">fuel</div>
      </div>
    </div>`).join('')}
  <div class="card card-accent" style="border-left-color:var(--green);margin-top:16px">
    <div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:8px">💡 Moving Day Tips</div>

      `Pre-load trailer the evening before to save time on the big day.`,

    ].map(tip => `<div class="tip-item"><span style="color:var(--green)">→</span> ${tip}</div>`).join('')}
  </div>`;
}

function renderFloorPlanSVG(items) {
  const sX=76, sY=72, uW=6*sX, uH=3*sY, pX=40, pY=30;
  const svgW=uW+pX*2, svgH=uH+pY*2+30;
  const zoneBounds={A:[0,2],B:[2,4.5],C:[4.5,6]};
  const zoneItems={A:[],B:[],C:[]};
  items.forEach(i=>{if(zoneItems[i.zone])zoneItems[i.zone].push(i);});
  const placed=[];
  Object.entries(zoneItems).forEach(([zone,zItems])=>{
    const [zS,zE]=zoneBounds[zone]; let rX=0,rY=zS,rMD=0;
    zItems.forEach(item=>{
      const iw=item.w_m,id=item.d_m;
      if(rX+iw>3){rY+=rMD;rX=0;rMD=0;}
      if(rY+id>zE){rY=zS;rX=0;}
      placed.push({...item,px:rX,py:rY});
      rX+=iw; if(id>rMD)rMD=id;
    });
  });
  const rects=placed.map(item=>{
    const x=pX+item.py*sX,y=pY+item.px*sY,w=item.d_m*sX,h=item.w_m*sY;
    const col=ZONE_COLORS[item.zone]||'#888';
    const n=item.name.length>13?item.name.slice(0,11)+'…':item.name;
    return `<rect x="${x+1}" y="${y+1}" width="${w-2}" height="${h-2}" rx="3" fill="${col}22" stroke="${col}" stroke-width="1.5"/>
      <text x="${x+w/2}" y="${y+h/2-5}" text-anchor="middle" fill="${col}" font-size="9" font-family="sans-serif" font-weight="600">${n}</text>
      <text x="${x+w/2}" y="${y+h/2+7}" text-anchor="middle" fill="${col}" font-size="8" font-family="sans-serif" opacity="0.8">#${item.loadOrder}</text>`;
  }).join('');
  const divs=[[2*sX+pX,'A|B'],[4.5*sX+pX,'B|C']].map(([dx,l])=>`
    <line x1="${dx}" y1="${pY}" x2="${dx}" y2="${pY+uH}" stroke="#333" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="${dx}" y="${pY-6}" text-anchor="middle" fill="#555" font-size="8" font-family="sans-serif">${l}</text>`).join('');
  return `<svg viewBox="0 0 ${svgW} ${svgH}" width="100%" xmlns="http://www.w3.org/2000/svg">
    <rect x="${pX}" y="${pY}" width="${uW}" height="${uH}" rx="4" fill="#0a0a18" stroke="#333" stroke-width="1.5"/>
    <rect x="${pX}" y="${pY}" width="${2*sX}" height="${uH}" fill="#E0525208"/>
    <rect x="${pX+2*sX}" y="${pY}" width="${2.5*sX}" height="${uH}" fill="#F0A50008"/>
    <rect x="${pX+4.5*sX}" y="${pY}" width="${1.5*sX}" height="${uH}" fill="#4CAF8208"/>
    <text x="${pX+sX}" y="${pY+12}" text-anchor="middle" fill="#E05252" font-size="9" font-family="sans-serif" opacity="0.7">Zone A</text>
    <text x="${pX+3.25*sX}" y="${pY+12}" text-anchor="middle" fill="#F0A500" font-size="9" font-family="sans-serif" opacity="0.7">Zone B</text>
    <text x="${pX+5.25*sX}" y="${pY+12}" text-anchor="middle" fill="#4CAF82" font-size="9" font-family="sans-serif" opacity="0.7">Zone C</text>
    ${divs}${rects}
    <rect x="${pX+uW-4}" y="${pY+uH/2-20}" width="8" height="40" rx="2" fill="#E86C3A" opacity="0.7"/>
    <text x="${pX-8}" y="${pY+uH/2+4}" text-anchor="middle" fill="#555" font-size="9" font-family="sans-serif" transform="rotate(-90,${pX-8},${pY+uH/2})">BACK WALL</text>
    <text x="${pX+uW+12}" y="${pY+uH/2+4}" fill="#E86C3A" font-size="9" font-family="sans-serif">DOOR</text>
    <text x="${pX+uW/2}" y="${pY+uH+18}" text-anchor="middle" fill="#555" font-size="9" font-family="sans-serif">← 6 metres →</text>
  </svg>`;
}

async function handleImageUpload(event) {
  if (!getApiKey()) { alert('Connect your Claude API key first (click "Ask Claude to update" button)'); return; }
  const files = Array.from(event.target.files);
  if (!files.length) return;
  for (const file of files) {
    const phId = 'ph_' + Date.now();
    const ph = document.createElement('div');
    ph.className = 'fp-analyzing'; ph.id = phId;
    ph.innerHTML = `<div style="display:flex;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.2s .2s infinite"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.2s .4s infinite"></span></div> Analysing ${file.name}…`;
    document.querySelector('.content').prepend(ph);
    try {
      const base64 = await fileToBase64(file);
      const mediaType = file.type || 'image/jpeg';
      const newItems = await analyzeImage(base64, mediaType);
      if (newItems && newItems.length) {
        if (!state.storageItems) state.storageItems = [];
        newItems.forEach(i => state.storageItems.push({...i, thumb: 'data:'+mediaType+';base64,'+base64}));
        renumberLoadOrder(); saveState();
      }
    } catch(e) { console.error(e); }
    const p = document.getElementById(phId); if(p) p.remove();
    render();
  }
  event.target.value = '';
}

function renumberLoadOrder() {
  let c=1;
  ['A','B','C'].forEach(zone => { state.storageItems.filter(i=>i.zone===zone).forEach(i=>{i.loadOrder=c++;}); });
}

function fileToBase64(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
}

async function analyzeImage(base64, mediaType) {
  const prompt = `Analyse this furniture/household image for packing into a 3x6m storage unit. Return ONLY a JSON array, no markdown:
[{"name":"short name","w_m":2.1,"d_m":0.9,"weight":"heavy|medium|light","zone":"A|B|C","notes":"brief packing tip"}]
Zone A=back wall (large heavy: sofas beds tables wardrobes). Zone B=middle (dressers shelves boxes suitcases). Zone C=front/door (clothing bins small boxes light items).
Estimate realistic dimensions. If multiple items visible, include all.`;
  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
      {type:'text',text:prompt}
    ]}]})
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  const raw = data.content[0].text.trim().replace(/```json|```/g,'').trim();
  const parsed = JSON.parse(raw);
  return (Array.isArray(parsed)?parsed:[parsed]).map(i=>({...i,id:'si_'+Date.now()+Math.random().toString(36).slice(2,6),loadOrder:1}));
}

function removeStorageItem(id) {
  state.storageItems = (state.storageItems||[]).filter(i=>i.id!==id);
  renumberLoadOrder(); saveState(); render();

function clearStorageItems() {

  ${state.notes.map((note, i) => `
    <div class="card card-accent" style="border-left-color:var(--blue);margin-bottom:10px">
      <div style="font-size:13px;line-height:1.7;color:#ddd">${note}</div>
    </div>
  `).join('')}
  ${state.notes.length === 0 ? '<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px 0">No notes yet. Ask Claude to add some!</div>' : ''}`;
}

// ═══════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════

function setTab(tab) { state.activeTab = tab; saveState(); render(); }
function setWeek(i) { state.activeWeek = i; saveState(); render(); }

function toggleTask(id) {
  state.checked[id] = !state.checked[id];
  saveState();
  render();
}

function updateCountdownColor() {
  const dl = daysLeft();
  const c = dl <= 14 ? 'var(--red)' : dl <= 28 ? 'var(--amber)' : 'var(--green)';
  const el = document.querySelector('.countdown-num');
  if (el) el.style.color = c;
}

// ═══════════════════════════════════════════════
//  CLAUDE PANEL
// ═══════════════════════════════════════════════

function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('claudePanel').classList.toggle('open', panelOpen);
  if (panelOpen) renderClaude();
}

function getApiKey() {
  return localStorage.getItem('anthropicKey') || '';
}

function renderClaude() {
  const body = document.getElementById('claudeBody');
  if (!getApiKey()) {
    body.innerHTML = `
      <div class="api-setup">
        <h3>Connect Claude AI</h3>
        <p>Enter your Anthropic API key to let Claude update your plan. Your key is saved locally in this browser only — never sent anywhere except Anthropic.</p>
        <input class="api-input" id="apiKeyInput" type="password" placeholder="sk-ant-api03-..." />
        <button class="api-save" onclick="saveKey()">Save & Connect</button>
        <a class="api-link" href="https://console.anthropic.com/account/keys" target="_blank">Get your API key at console.anthropic.com/account/keys →</a>
      </div>`;
  } else {
    body.innerHTML = `
      <div class="claude-messages" id="claudeMessages"></div>
      <div class="claude-input-row">
        <textarea class="claude-input" id="claudeInput" rows="2" placeholder='e.g. "Mark task 1 done" or "Add a budget item for curtains R500"'
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button class="claude-send" id="claudeSend" onclick="sendMessage()">Send</button>
      </div>`;
    renderMessages();
    if (chatMessages.length === 0) {
      addSystemMsg("Hi! Tell me what to update in your plan. Examples: \"Mark task 2 as done\", \"Add a budget item for curtains: R400–600\", \"Add a note about parking at in-laws\", \"Add a task in week 3 for X\"");
    }
  }
}

function saveKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) { localStorage.setItem('anthropicKey', key); renderClaude(); }
}

function addSystemMsg(text) {
  chatMessages.push({ role: 'system', text });
  renderMessages();
}

function renderMessages() {
  const el = document.getElementById('claudeMessages');
  if (!el) return;
  el.innerHTML = chatMessages.map(m => {
    if (m.role === 'thinking') return `<div class="msg assistant"><div class="thinking"><span></span><span></span><span></span></div></div>`;
    return `<div class="msg ${m.role === 'user' ? 'user' : m.role === 'system' ? 'system' : 'assistant'}">${m.text}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('claudeInput');
  const text = input.value.trim();
  if (!text || isThinking) return;

  chatMessages.push({ role: 'user', text });
  input.value = '';
  isThinking = true;
  document.getElementById('claudeSend').disabled = true;
  chatMessages.push({ role: 'thinking' });
  renderMessages();

  try {
    const systemPrompt = buildSystemPrompt();
    const apiMessages = chatMessages
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }));

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getApiKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: apiMessages,
      })
    });

    const data = await response.json();

    if (data.error) throw new Error(data.error.message);

    const raw = data.content[0].text;
    chatMessages = chatMessages.filter(m => m.role !== 'thinking');

    // Try to extract JSON
    const jsonMatch = raw.match(/```json\s*([\s\S]*?)```/) || raw.match(/(\{[\s\S]*\})/);
    if (jsonMatch) {
      try {
        const parsed = JSON.parse(jsonMatch[1]);
        applyChanges(parsed.changes || []);
        chatMessages.push({ role: 'assistant', text: parsed.message || 'Done! Plan updated.' });
        render();
      } catch(e) {
        chatMessages.push({ role: 'assistant', text: raw });
      }
    } else {
      chatMessages.push({ role: 'assistant', text: raw });
    }
  } catch(e) {
    chatMessages = chatMessages.filter(m => m.role !== 'thinking');
    chatMessages.push({ role: 'assistant', text: `Error: ${e.message}. Check your API key or try again.` });
  }

  isThinking = false;
  renderMessages();
  const sendBtn = document.getElementById('claudeSend');
  if (sendBtn) sendBtn.disabled = false;
}

function buildSystemPrompt() {
  const stateSnapshot = {
    weeks: state.weeks.map(w => ({
      id: w.id, label: w.label, dates: w.dates, theme: w.theme,
      tasks: w.tasks.map(t => ({ id: t.id, text: t.text, critical: t.critical, done: !!state.checked[t.id] }))
    })),
    budget: state.budget,
    notes: state.notes,
  };

  return `You are an AI assistant embedded in a moving plan app. The user wants you to update their plan.

CURRENT PLAN STATE:
${JSON.stringify(stateSnapshot, null, 2)}

When the user asks you to make changes, respond with a JSON object in a markdown code block like this:
\`\`\`json
{
  "message": "Brief friendly confirmation of what you did",
  "changes": [
    ... list of change operations ...
  ]
}
\`\`\`

AVAILABLE CHANGE OPERATIONS:

1. Toggle a task done/undone:
{"op": "toggle_task", "id": "t1"}

2. Mark a task done (regardless of current state):
{"op": "set_task_done", "id": "t1", "done": true}

3. Add a new task to a week:
{"op": "add_task", "weekId": "w1", "text": "Task description", "critical": false}

4. Update task text:
{"op": "update_task", "id": "t1", "text": "New task text"}

5. Add a budget item:
{"op": "add_budget", "category": "Moving", "item": "Item description", "low": 500, "high": 1000}

6. Update a budget item:
{"op": "update_budget", "id": "b1", "item": "New name", "low": 500, "high": 800}

7. Add a note:
{"op": "add_note", "text": "Note content"}

8. Replace a note (0-indexed):
{"op": "update_note", "index": 0, "text": "New note text"}

9. Remove a note (0-indexed):
{"op": "remove_note", "index": 0}

10. Remove a task:
{"op": "remove_task", "id": "t1"}

You can apply multiple changes at once. Always confirm what you did in the "message" field in a friendly, concise way.
If the user asks something that doesn't require a change (like a question), respond conversationally without a JSON block.
10. Update logistics setting:
{"op": "update_logistic", "key": "petrolPrice", "value": 27.50}
Available keys: distanceKm, trailerLengthM, trailerWidthM, trailerHeightM, mazda5Lper100, poloPer100, petrolPrice, extraPoloTrips

Context: This is a downsize move in Potchefstroom, North West, South Africa. The person is moving to live with their in-laws to save money toward financial goals. Move deadline is 30 May 2026.`;
}

function applyChanges(changes) {
  changes.forEach(change => {
    switch(change.op) {
      case 'toggle_task':
        state.checked[change.id] = !state.checked[change.id];
        break;
      case 'set_task_done':
        state.checked[change.id] = change.done;
        break;
      case 'add_task': {
        const week = state.weeks.find(w => w.id === change.weekId);
        if (week) week.tasks.push({ id: uid(), text: change.text, critical: !!change.critical });
        break;
      }
      case 'update_task': {
        state.weeks.forEach(w => {
          const t = w.tasks.find(t => t.id === change.id);
          if (t && change.text) t.text = change.text;
          if (t && change.critical !== undefined) t.critical = change.critical;
        });
        break;
      }
      case 'remove_task':
        state.weeks.forEach(w => { w.tasks = w.tasks.filter(t => t.id !== change.id); });
        break;
      case 'add_budget':
        state.budget.push({ id: budgetUID(), category: change.category || 'Other', item: change.item, low: change.low, high: change.high });
        break;
      case 'update_budget': {
        const b = state.budget.find(b => b.id === change.id);
        if (b) { if (change.item) b.item = change.item; if (change.low) b.low = change.low; if (change.high) b.high = change.high; if (change.category) b.category = change.category; }
        break;
      }
      case 'add_note':
        state.notes.push(change.text);
        break;
      case 'update_note':
        if (state.notes[change.index] !== undefined) state.notes[change.index] = change.text;
        break;
      case 'update_logistic':
        if (!state.logistics) state.logistics = {};
        state.logistics[change.key] = parseFloat(change.value);
        break;
      case 'remove_note':
        state.notes.splice(change.index, 1);
        break;
    }
  });
  saveState();
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════

render();
</script>
